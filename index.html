<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Living Systems — a gallery of emergence</title>
  <meta name="description" content="Seven interactive generative artworks built from simple rules: a flow field, a flock, reaction–diffusion, a recursive garden, a slime-mould network, a fluid sim, and a starfield — with a generative ambient soundtrack." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='none' stroke='%232ec4b6' stroke-width='6'/><circle cx='50' cy='50' r='10' fill='%23e9ff70'/></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <header id="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div class="brand-text">
        <h1>Living Systems</h1>
        <p>a gallery of emergence</p>
      </div>
    </div>
    <nav id="tabs" aria-label="Sketches"></nav>
  </header>

  <aside id="panel">
    <section class="card">
      <h2 id="sketch-title">—</h2>
      <p id="sketch-blurb" class="blurb">—</p>
    </section>

    <section class="card">
      <div id="controls"></div>
    </section>

    <section class="card actions">
      <div class="palette-row">
        <button id="btn-palette" class="action" title="Cycle palette (P)">Palette</button>
        <span id="palette-name" class="palette-name">—</span>
      </div>
      <div class="action-grid">
        <button id="btn-pause" class="action" title="Pause / play (Space)">Pause</button>
        <button id="btn-regen" class="action" title="Regenerate (R)">Regenerate</button>
        <button id="btn-save" class="action" title="Save PNG (S)">Save PNG</button>
        <button id="btn-fullscreen" class="action" title="Fullscreen (F)">Fullscreen</button>
        <button id="btn-share" class="action wide" title="Copy a link to this exact scene (C)">Copy link</button>
        <button id="btn-hide" class="action wide" title="Hide interface (H)">Hide UI</button>
      </div>
    </section>

    <section class="card ambience">
      <h3 class="card-heading">Ambience</h3>
      <p class="card-note">Generative drone + soft chimes. A calming companion for sleep or focus — best in fullscreen with the UI hidden.</p>
      <div class="action-grid">
        <button id="btn-sound" class="action" title="Toggle sound (M)">Sound: off</button>
        <button id="btn-sleep" class="action accent" title="Cosmos · soft audio · fullscreen">Sleep mode</button>
      </div>
      <div class="control">
        <label>Volume</label>
        <input id="vol" type="range" min="0" max="1" step="0.01" value="0.55" />
      </div>
      <div class="control">
        <label>Chimes</label>
        <input id="twinkle" type="range" min="0" max="1" step="0.05" value="0.5" />
      </div>
    </section>
  </aside>

  <footer id="hints">
    <span><kbd>Space</kbd> pause</span>
    <span><kbd>R</kbd> regenerate</span>
    <span><kbd>P</kbd> palette</span>
    <span><kbd>S</kbd> save</span>
    <span><kbd>H</kbd> hide UI</span>
    <span><kbd>F</kbd> fullscreen</span>
    <span><kbd>M</kbd> sound</span>
    <span><kbd>1</kbd>–<kbd>7</kbd> switch</span>
    <span class="muted">move / drag the pointer to interact</span>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
